<div class="contained-fluid">
    <div class="row">
        <div class="col-11">
            <div class="dmn-container">
                <div #dmnViewerRef id="dmn-canvas">
                    <div class="row">
                        <div class="col-11">
                            <div class="editor-tabs">
                                @for(view of views; track view; let idx = $index) {
                                    <div class="tab" [class.active]="idx === activeViewIdx" (click)="openView(idx)">
                                        <span class="{{ checkClass(view.type) }}"></span>
                                        {{ view.element.name || view.element.id }}
                                    </div>
                                }
                            </div>
                        </div>
                        <div class="col-1">
                            <div class="btn-group" role="group" aria-label="Button group">
                                <button [routerLink]="['/dmns/' + this.dmnId + '/' + this.dmnVersion +'/edit']" [state]="{id: this.dmnId, version: this.dmnVersion, file: this.dmnFile}" type="button" class="btn btn-primary">Bewerken</button>
                                <button type="button" class="btn btn-primary">Indienen</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
