<div class="container">
    <div class="row">
        <div class="col">
            <app-breadcrumbs-partial [breadcrumbs]="breadcrumb"></app-breadcrumbs-partial>
        </div>
    </div>
    <div class="row">
        <div class="col">
            <h3>Unittest - {{ this.data.title }}</h3>
        </div>
        <div class="col text-end">
            <div class="btn-group" role="group">
                <button class="btn btn-primary" [routerLink]="['../create']" [state]="{ data: this.filtered_dmnVars[0], fresh: false, import: this.data }" type="button">Invoegen</button>
                <button class="btn btn-primary" type="button">Controlleren</button>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-6"></div>
        <div class="col-6"></div>
    </div>
</div>
